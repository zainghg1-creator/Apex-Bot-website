<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Bot – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-base: #000000;
      --bg-surface: #0a0a0a;
      --border-subtle: rgba(255, 255, 255, 0.12);
      --border-active: rgba(255, 255, 255, 0.4);
      --text-primary: #ffffff;
      --text-muted: #a1a1aa;
      --text-dim: #71717a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 20px 6%; backdrop-filter: blur(12px); background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text-primary); }
    .brand-logo { width: 34px; height: 34px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.3); }
    .brand-name { font-size: 1.1rem; font-weight: 800; }

    .user-chip { display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.05); padding: 6px 12px; border-radius: 30px; border: 1px solid var(--border-subtle); }
    .user-chip img { width: 30px; height: 30px; border-radius: 50%; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 18px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; text-decoration: none; border: 1px solid transparent; cursor: pointer; transition: all 0.2s ease; font-family: inherit; }
    .btn-primary { background: #ffffff; color: #000000; }
    .btn-primary:hover { background: #e4e4e7; }
    .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); border-color: var(--border-subtle); }

    .container { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
    .guild-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .guild-card { background: var(--bg-surface); padding: 1.4rem; border-radius: 16px; border: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 18px; }
    .guild-info { display: flex; align-items: center; gap: 14px; }
    .guild-icon { width: 46px; height: 46px; border-radius: 50%; }

    /* Overlay Sidebar Layout */
    .overlay { position: fixed; inset: 0; background: var(--bg-base); display: flex; z-index: 200; }
    .sidebar { width: 270px; background: var(--bg-surface); border-right: 1px solid var(--border-subtle); padding: 1.75rem 1.1rem; display: flex; flex-direction: column; }
    .sidebar-header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; padding-bottom: 1.1rem; border-bottom: 1px solid var(--border-subtle); }
    .sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 11px 14px; border-radius: 10px; text-align: left; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .tab-btn.active { background: #ffffff; color: #000000; }

    .content-area { flex: 1; padding: 2.75rem; overflow-y: auto; }
    .card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 1.5rem; margin-top: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 11px; color: #fff; }
    .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; }

    /* Toast Notification unten rechts */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; }
    .toast { background: #ffffff; color: #000000; padding: 14px 22px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); opacity: 0; transform: translateY(20px); transition: all 0.3s ease; }
    .toast.show { opacity: 1; transform: translateY(0); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <a href="/" class="brand"><span class="brand-name">APEX BOT</span></a>
    <div id="user-chip" class="user-chip">
      <img id="user-avatar" src="" alt="Avatar">
      <span id="user-name">Laden...</span>
    </div>
  </header>

  <main class="container">
    <h2>Wähle einen Server</h2>
    <div id="guild-list" class="guild-grid" style="margin-top: 20px;"></div>
  </main>

  <!-- Overlay Dashboard -->
  <div id="manage-overlay" class="overlay hidden">
    <div class="sidebar">
      <div class="sidebar-header">
        <img id="active-guild-icon" src="" style="width:36px;height:36px;border-radius:50%;">
        <span id="active-guild-name">Server</span>
      </div>
      <nav class="sidebar-nav">
        <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Übersicht</button>
        <button class="tab-btn" data-tab="welcome" onclick="switchTab('welcome')">Willkommen</button>
        <button class="tab-btn" data-tab="leave" onclick="switchTab('leave')">Leave / Verlassen</button>
        <button class="tab-btn" data-tab="tickets" onclick="switchTab('tickets')">Ticket System</button>
        <button class="tab-btn" data-tab="teamlist" onclick="switchTab('teamlist')">Teamliste</button>
      </nav>
      <button class="btn btn-secondary" onclick="closeManagement()">← Server wechseln</button>
    </div>

    <div class="content-area">

      <!-- Übersicht Tab -->
      <div id="mod-overview" class="module-page">
        <h2>Server Übersicht</h2>
        <div style="display:flex; gap:20px; margin-top:20px;">
          <div class="card" style="flex:1;"><h3>Mitglieder</h3><p id="overview-members" style="font-size:1.8rem; font-weight:800;">0</p></div>
          <div class="card" style="flex:1;"><h3>Boosts</h3><p id="overview-boosts" style="font-size:1.8rem; font-weight:800;">0</p></div>
        </div>
      </div>

      <!-- Willkommen Tab -->
      <div id="mod-welcome" class="module-page hidden">
        <h2>Willkommens-System</h2>
        <div class="card">
          <div class="form-group">
            <label>Willkommens-Kanal ID</label>
            <input type="text" id="welcome-channel">
          </div>
          <div class="form-group">
            <label>Nachricht / Embed-Text</label>
            <textarea id="welcome-text" rows="3" placeholder="Willkommen {user} auf {server}!"></textarea>
          </div>
          <div class="form-group">
            <label>Embed Farbe (Hex)</label>
            <input type="color" id="welcome-color" value="#5865F2">
          </div>
          <div class="form-group">
            <label>Bild URL (Großes Bild)</label>
            <input type="text" id="welcome-image" placeholder="https://beispiel.de/bild.png">
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="welcome-avatar-thumbnail">
            <label for="welcome-avatar-thumbnail">Profilbild des Users als Thumbnail anzeigen</label>
          </div>
          <div class="form-group">
            <label>Auto-Rollen IDs (Kommagetrennt)</label>
            <input type="text" id="welcome-autoroles" placeholder="123456789,987654321">
          </div>
          <button class="btn btn-primary" onclick="saveModuleSettings('welcome')">Einstellungen speichern</button>
        </div>
      </div>

      <!-- Leave Tab -->
      <div id="mod-leave" class="module-page hidden">
        <h2>Verlassen-System (Leave)</h2>
        <div class="card">
          <div class="form-group">
            <label>Leave-Kanal ID</label>
            <input type="text" id="leave-channel">
          </div>
          <div class="form-group">
            <label>Nachricht / Embed-Text</label>
            <textarea id="leave-text" rows="3" placeholder="{user} hat den Server verlassen."></textarea>
          </div>
          <div class="form-group">
            <label>Embed Farbe (Hex)</label>
            <input type="color" id="leave-color" value="#ED4245">
          </div>
          <div class="form-group">
            <label>Bild URL</label>
            <input type="text" id="leave-image">
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="leave-avatar-thumbnail">
            <label for="leave-avatar-thumbnail">Profilbild des Users als Thumbnail anzeigen</label>
          </div>
          <button class="btn btn-primary" onclick="saveModuleSettings('leave')">Einstellungen speichern</button>
        </div>
      </div>

      <!-- Tickets Tab -->
      <div id="mod-tickets" class="module-page hidden">
        <h2>Ticket System</h2>
        <div class="card">
          <div class="form-group">
            <label>Kanal ID für das Embed (wo User Tickets öffnen)</label>
            <input type="text" id="ticket-embed-channel">
          </div>
          <div class="form-group">
            <label>Embed Nachricht / Titel</label>
            <input type="text" id="ticket-embed-text" value="Klicke unten, um ein Ticket zu erstellen!">
          </div>
          <div class="form-group">
            <label>Kategorie ID (wo erstelle Tickets landen)</label>
            <input type="text" id="ticket-category">
          </div>
          <div class="form-group">
            <label>Willkommens-Nachricht im neuen Ticket</label>
            <textarea id="ticket-welcome-msg" rows="3" placeholder="Hallo {user}, ein Supporter wird sich gleich um dich kümmern."></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveModuleSettings('tickets')">Einstellungen speichern</button>
        </div>
      </div>

      <!-- Teamliste Tab -->
      <div id="mod-teamlist" class="module-page hidden">
        <h2>Teamliste System</h2>
        <div class="card">
          <div class="form-group">
            <label>Kanal ID für die Teamliste</label>
            <input type="text" id="teamlist-channel">
          </div>
          <div class="form-group">
            <label>Rollen IDs (Kommagetrennt, in Reihenfolge)</label>
            <input type="text" id="teamlist-roles" placeholder="RoleID1, RoleID2, RoleID3...">
            <small>Füge unendlich viele Rollen-IDs mit Komma getrennt ein.</small>
          </div>
          <button class="btn btn-primary" onclick="saveModuleSettings('teamlist')">Einstellungen speichern</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Element -->
  <div id="toast-container"><div id="toast" class="toast">✓ Einstellungen erfolgreich gespeichert!</div></div>

  <script src="/dashboard.js"></script>
</body>
</html>
