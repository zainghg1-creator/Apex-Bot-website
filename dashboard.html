<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex – Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #000000;
    --bg-surface: #0a0a0a;
    --bg-card: rgba(18, 18, 18, 0.7);
    --border-subtle: rgba(255, 255, 255, 0.12);
    --border-active: rgba(255, 255, 255, 0.4);
    --accent-monochrome: #ffffff;
    --text-primary: #ffffff;
    --text-muted: #a1a1aa;
    --text-dim: #71717a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -1;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 6%;
    backdrop-filter: blur(12px);
    background: rgba(0, 0, 0, 0.8);
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand { display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text-primary); }
  .brand-logo {
    width: 34px; height: 34px; background: #000; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }
  .brand-name { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }

  .user-chip {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.85rem; color: var(--text-muted);
  }
  .user-chip img { width: 28px; height: 28px; border-radius: 50%; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 9px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
    text-decoration: none; border: 1px solid transparent; cursor: pointer;
    transition: all 0.2s ease; white-space: nowrap;
  }
  .btn-primary { background: #ffffff; color: #000000; }
  .btn-primary:hover { background: #e4e4e7; transform: translateY(-1px); }
  .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); border-color: var(--border-subtle); }
  .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); border-color: var(--border-active); }

  main { max-width: 1000px; margin: 0 auto; padding: 48px 24px 100px; }

  .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
  .page-subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 36px; }

  .guild-list { display: flex; flex-direction: column; gap: 12px; }

  .guild-row {
    display: flex; align-items: center; gap: 16px;
    background: var(--bg-surface); border: 1px solid var(--border-subtle);
    border-radius: 14px; padding: 14px 18px;
    transition: border-color 0.2s ease;
  }
  .guild-row:hover { border-color: var(--border-active); }

  .guild-icon {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255, 255, 255, 0.08); object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.9rem; color: var(--text-muted);
  }

  .guild-info { flex: 1; min-width: 0; }
  .guild-name {
    font-weight: 600; font-size: 0.98rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .guild-status {
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; margin-top: 3px;
  }
  .status-active { color: #ffffff; }
  .status-missing { color: var(--text-dim); }

  .state-box {
    text-align: center; padding: 80px 20px; color: var(--text-muted);
  }
  .state-box .spinner {
    width: 28px; height: 28px; margin: 0 auto 20px;
    border: 2px solid var(--border-subtle); border-top-color: var(--text-primary);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="bg-grid"></div>

<header>
  <a href="/" class="brand">
    <div class="brand-logo">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 18 L22 75 L38 75 L50 48 L62 75 L78 75 Z" fill="#FFFFFF"/>
        <path d="M15 50 C20 25, 40 12, 68 12" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
        <path d="M85 50 C80 75, 60 88, 32 88" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
        <line x1="72" y1="20" x2="28" y2="80" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-name">APEX<span>.</span></span>
  </a>

  <div id="user-chip" class="user-chip hidden">
    <img id="user-avatar" src="" alt="">
    <span id="user-name"></span>
    <a href="/auth/logout" class="btn btn-secondary" style="margin-left: 8px;">Abmelden</a>
  </div>
</header>

<main>
  <h1 class="page-title">Deine Server</h1>
  <p class="page-subtitle">Alle Discord-Server, auf denen du Administrator bist.</p>

  <div id="loading-state" class="state-box">
    <div class="spinner"></div>
    <p>Server werden geladen …</p>
  </div>

  <div id="empty-state" class="state-box hidden">
    <p>Wir haben keine Server gefunden, auf denen du Administrator bist.</p>
  </div>

  <div id="error-state" class="state-box hidden">
    <p id="error-message">Etwas ist schiefgelaufen.</p>
    <a href="/auth/discord/login" class="btn btn-secondary" style="margin-top: 16px;">Erneut anmelden</a>
  </div>

  <div id="guild-list" class="guild-list hidden"></div>
</main>

<script src="dashboard.js"></script>
</body>
</html>
